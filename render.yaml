services:
  - type: web
    name: cbfinace-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r app/api/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: FRONTEND_ORIGINS
        value: https://cbfinace.vercel.app,http://127.0.0.1:5173,http://localhost:5173

